  <!-- Tagline -->
  <text x="122" y="86" style="font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 10.5px; fill: #85B7EB; letter-spacing: 3.5px; font-weight: 500;">INDIA'S RERA DIRECTORY</text>
